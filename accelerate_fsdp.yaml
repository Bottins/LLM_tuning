# accelerate_fsdp.yaml
# Configurazione FSDP per training multi-nodo su CINECA (16 GPU, 2 nodi da 8 GPU ciascuno)
# Usato da: accelerate launch --config_file accelerate_fsdp.yaml finetune.py

compute_environment: LOCAL_MACHINE
distributed_type: FSDP
fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_cpu_ram_efficient_loading: true
  fsdp_forward_prefetch: false
  fsdp_offload_params: false          # true se OOM, ma più lento
  fsdp_sharding_strategy: FULL_SHARD  # sharda tutto: params + grads + optimizer
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
machine_rank: 0                       # sovrascritto dal PBS
main_process_ip: null                 # sovrascritto dal PBS
main_process_port: 29500
main_training_function: main
mixed_precision: bf16
num_machines: 2                       # 2 nodi CINECA
num_processes: 16                     # 8 GPU per nodo × 2 nodi
rdzv_backend: c10d
same_network: true
